<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber-Math Overdrive</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cyber-Math">
    <link rel="apple-touch-icon" href="icon.svg">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --neon-cyan: #00f3ff; --neon-pink: #ff007f; --neon-green: #39ff14;
            --dark-bg: #050510; --grid-color: rgba(0, 243, 255, 0.15);
            --block-bg: rgba(0, 0, 0, 0.9); --block-border: #00f3ff;
        }

        body {
            font-family: 'Share Tech Mono', monospace; background-color: var(--dark-bg);
            margin: 0; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: var(--neon-cyan); overflow: hidden;
            touch-action: none; -webkit-tap-highlight-color: transparent;
        }

        /* Hardware Accelerated Galaxy Background */
        .galaxy-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(45, 10, 89, 0.8) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(10, 50, 89, 0.8) 0%, transparent 50%),
                        var(--dark-bg);
            z-index: -10; transform: translate3d(0,0,0);
        }

        .stars { 
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; 
            background-image: radial-gradient(2px 2px at 20px 30px, #fff, transparent), 
                              radial-gradient(2px 2px at 150px 40px, rgba(255,255,255,0.6), transparent);
            background-size: 250px 250px; animation: drift 120s linear infinite; 
            pointer-events: none; will-change: transform;
        }

        .cyber-grid {
            position: fixed; bottom: -50%; left: -50%; width: 200%; height: 200%;
            background-image: linear-gradient(transparent 64%, var(--grid-color) 65%, var(--grid-color) 67%, transparent 68%), 
                              linear-gradient(90deg, transparent 64%, var(--grid-color) 65%, var(--grid-color) 67%, transparent 68%);
            background-size: 60px 60px; transform: rotateX(60deg) translate3d(0,0,0); 
            animation: gridMove 4s linear infinite; z-index: -5; pointer-events: none;
            will-change: transform;
        }

        @keyframes drift { from { transform: translate3d(0,0,0); } to { transform: translate3d(-5%, -5%, 0); } }
        @keyframes gridMove { from { transform: rotateX(60deg) translate3d(0,0,0); } to { transform: rotateX(60deg) translate3d(0, 60px, 0); } }

        #hud-container {
            width: 92%; max-width: 500px; position: relative; z-index: 10;
            background: rgba(5, 5, 16, 0.9); border: 2px solid var(--neon-cyan);
            border-radius: 12px; padding: 20px; box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
            opacity: 0; transition: opacity 0.5s;
        }

        .action-btn { 
            background: rgba(0,0,0,0.5); color: var(--neon-cyan); border: 2px solid var(--neon-cyan); 
            padding: 12px; font-family: 'Share Tech Mono'; cursor: pointer; text-transform: uppercase; 
            width: 100%; border-radius: 6px; font-weight: bold;
        }

        .drop-zone { min-height: 110px; border: 1px dashed rgba(0, 243, 255, 0.4); background: rgba(0, 243, 255, 0.05); margin: 15px 0; display: flex; flex-wrap: wrap; justify-content: center; align-content: flex-start; gap: 10px; border-radius: 8px; }
        
        .block {
            width: 58px; height: 58px; background: var(--block-bg); border: 2px solid var(--block-border); color: var(--block-border);
            font-family: 'Orbitron'; font-size: 22px; font-weight: 700; display: flex; justify-content: center; align-items: center; 
            border-radius: 10px; user-select: none; touch-action: none; cursor: grab;
        }
        .block.dragging { opacity: 0.6; z-index: 9999 !important; transform: scale(1.1); pointer-events: none; }

        #target-num { font-family: 'Orbitron'; font-size: 70px; color: var(--neon-cyan); text-align: center; display: block; margin: 10px 0; text-shadow: 0 0 25px rgba(0, 243, 255, 0.6); font-weight: 900; }

        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
        .login-box { background: rgba(5, 5, 16, 0.95); border: 2px solid var(--neon-cyan); padding: 30px; border-radius: 15px; width: 300px; text-align: center; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 16, 0.98); z-index: 200; display: none; flex-direction: column; align-items: center; padding: 40px 20px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="galaxy-bg"><div class="stars"></div></div>
<div class="cyber-grid"></div>

<div id="start-screen">
    <h1 style="color:var(--neon-cyan); font-family:'Orbitron'; font-size: 32px; margin-bottom: 20px;">CYBER-MATH</h1>
    <div class="login-box">
        <input type="text" id="hacker-id-input" class="action-btn" placeholder="ENTER ID" style="margin-bottom:12px; text-align:center;">
        <button class="action-btn" onclick="loadHackerId()" style="margin-bottom:12px;">RESUME SESSION</button>
        <div style="border-bottom:1px solid #333; margin:15px 0;"></div>
        <select id="difficulty-select" class="action-btn" style="margin-bottom:12px; background:#000;">
            <option value="easy">EASY MODE</option>
            <option value="medium" selected>MEDIUM MODE</option>
            <option value="hard">HARD MODE</option>
        </select>
        <button class="action-btn" style="border-color:var(--neon-pink); color:var(--neon-pink);" onclick="startNewSession()">NEW HACKER</button>
        <p id="auth-msg" style="color:var(--neon-pink); font-size:12px; margin-top:12px; font-weight: bold;"></p>
    </div>
</div>

<div id="hud-container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px;">
        <div>
            <h2 style="margin:0; font-size:16px;">NODE <span id="level-txt">1</span></h2>
            <div id="display-diff" style="color:var(--neon-pink); font-size:11px; font-weight:900;">MEDIUM</div>
        </div>
        <div id="timer" style="font-size:28px; font-family:'Orbitron';">30.0</div>
    </div>
    <div style="display:flex; justify-content:space-between; margin:10px 0; font-size:14px; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 5px;">
        <div style="color:#f1c40f;">CORES: <span id="core-txt">0</span></div>
        <div style="color:var(--neon-pink);">COMBO: x<span id="combo-txt">1</span></div>
    </div>
    <div style="display:flex; gap:12px; margin-bottom: 10px;">
        <button class="action-btn" id="emp-btn" onclick="triggerEMP()">EMP</button>
        <button class="action-btn" onclick="openStore()" style="border-color:#f1c40f; color:#f1c40f;">STORE</button>
    </div>
    <div id="target-num">0</div>
    <div id="drop-zone" class="drop-zone"></div>
    <div id="pool-zone" class="drop-zone"></div>
    <div id="system-msg" style="text-align:center; font-weight:900; height:24px; color: var(--neon-green);"></div>
</div>

<div id="store-overlay" class="overlay">
    <h2 style="color:#f1c40f; font-family:'Orbitron';">BLACK MARKET</h2>
    <p>Cores: <span id="store-balance" style="color:#f1c40f;">0</span></p>
    <button class="action-btn" style="margin-bottom:10px;" onclick="purchaseUpgrade('timeDilator', 1000)">Time Dilator (1000)</button>
    <button class="action-btn" onclick="closeStore()">BACK TO NODE</button>
</div>

<script>
    let currentHackerId = "";
    let sys = { level: 1, target: 0, time: 30, active: false, combo: 1, cores: 0, difficulty: 'medium', upgrades: { timeDilator: false } };
    
    let audioCtx;
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSound(freq, duration = 0.1) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    // --- GAME ENGINE ---
    function startGameUI() {
        initAudio();
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('hud-container').style.opacity = '1';
        document.getElementById('display-diff').innerText = sys.difficulty.toUpperCase();
        updateUI(); initProtocol();
    }

    function updateUI() {
        document.getElementById('level-txt').innerText = sys.level;
        document.getElementById('core-txt').innerText = sys.cores;
        document.getElementById('combo-txt').innerText = sys.combo;
    }

    // --- IMPROVED DRAG & DROP ---
    let draggedBlock = null; let offsetX = 0, offsetY = 0;
    function handleStart(e) {
        const touch = e.touches ? e.touches[0] : e;
        const target = touch.target.closest('.block');
        if (!target || !sys.active) return;
        draggedBlock = target;
        const rect = draggedBlock.getBoundingClientRect();
        offsetX = touch.clientX - rect.left;
        offsetY = touch.clientY - rect.top;
        draggedBlock.classList.add('dragging');
        document.body.appendChild(draggedBlock);
        moveAt(touch.clientX, touch.clientY);
        playSound(440, 0.05);
    }

    function moveAt(x, y) {
        if(!draggedBlock) return;
        draggedBlock.style.position = 'fixed';
        draggedBlock.style.left = (x - offsetX) + 'px';
        draggedBlock.style.top = (y - offsetY) + 'px';
    }

    function handleMove(e) { if(draggedBlock) { e.preventDefault(); const t = e.touches ? e.touches[0] : e; moveAt(t.clientX, t.clientY); } }

    function handleEnd(e) {
        if (!draggedBlock) return;
        const touch = e.changedTouches ? e.changedTouches[0] : e;
        const dz = document.getElementById('drop-zone');
        const dzRect = dz.getBoundingClientRect();
        
        draggedBlock.classList.remove('dragging');
        if (touch.clientX >= dzRect.left && touch.clientX <= dzRect.right && touch.clientY >= dzRect.top && touch.clientY <= dzRect.bottom) {
            dz.appendChild(draggedBlock);
        } else {
            document.getElementById('pool-zone').appendChild(draggedBlock);
        }
        
        draggedBlock.style.position = ''; draggedBlock.style.left = ''; draggedBlock.style.top = '';
        draggedBlock = null;
        playSound(220, 0.05);
        validateInput();
    }

    document.addEventListener('touchstart', handleStart, {passive: false});
    document.addEventListener('touchmove', handleMove, {passive: false});
    document.addEventListener('touchend', handleEnd);
    document.addEventListener('mousedown', handleStart);
    document.addEventListener('mousemove', handleMove);
    document.addEventListener('mouseup', handleEnd);

    function initProtocol() {
        sys.active = true;
        document.getElementById('drop-zone').innerHTML = '';
        document.getElementById('pool-zone').innerHTML = '';
        
        let count = sys.difficulty === 'easy' ? 2 : (sys.difficulty === 'hard' ? 4 : 3);
        let max = sys.difficulty === 'easy' ? 6 : 12;
        let sum = 0; let blocks = [];
        
        for(let i=0; i<count; i++) {
            let v = Math.floor(Math.random() * max) + 1;
            sum += v; blocks.push({v:v, d:false});
        }
        sys.target = sum;
        document.getElementById('target-num').innerText = sum;

        // Decoy logic
        let decoys = sys.level > 5 ? (sys.difficulty === 'easy' ? 1 : 2) : 0;
        for(let i=0; i<decoys; i++) blocks.push({v: Math.floor(Math.random()*max)+1, d:true});

        blocks.sort(() => Math.random() - 0.5).forEach(b => {
            const el = document.createElement('div'); el.className = 'block'; el.innerText = b.v; el.dataset.val = b.v;
            document.getElementById('pool-zone').appendChild(el);
        });
        startClock();
    }

    // --- NEW RELAXED TIMERS ---
    function startClock() {
        clearInterval(sys.timerInterval);
        
        let calculatedTime;
        if(sys.difficulty === 'easy') calculatedTime = Math.max(25, 45 - Math.floor((sys.level - 1) * 0.5)); 
        else if(sys.difficulty === 'hard') calculatedTime = Math.max(15, 35 - Math.floor((sys.level - 1) * 1.5)); 
        else calculatedTime = Math.max(20, 40 - (sys.level - 1));

        if(sys.upgrades.timeDilator) calculatedTime += 3.0;
        sys.time = calculatedTime;

        sys.timerInterval = setInterval(() => {
            sys.time -= 0.1;
            document.getElementById('timer').innerText = sys.time.toFixed(1);
            if(sys.time <= 0) { sys.level = 1; sys.combo = 1; updateUI(); initProtocol(); }
        }, 100);
    }

    function validateInput() {
        let cur = 0;
        for(let b of document.getElementById('drop-zone').children) cur += parseInt(b.dataset.val);
        if (cur === sys.target) {
            sys.active = false; clearInterval(sys.timerInterval);
            playSound(880, 0.2);
            sys.level++; sys.cores += 15; sys.combo++;
            updateUI(); window.cloudSave(); confetti();
            setTimeout(initProtocol, 1500);
        } else if (cur > sys.target) {
            document.getElementById('system-msg').innerText = "OVERLOAD!";
            setTimeout(() => { document.getElementById('system-msg').innerText = ""; initProtocol(); }, 1000);
        }
    }

    function triggerEMP() {
        const pool = document.getElementById('pool-zone');
        if(pool.children.length > 0) { pool.removeChild(pool.children[0]); playSound(100, 0.3); }
    }

    function openStore() { sys.active = false; clearInterval(sys.timerInterval); document.getElementById('store-balance').innerText = sys.cores; document.getElementById('store-overlay').style.display = 'flex'; }
    function closeStore() { document.getElementById('store-overlay').style.display = 'none'; sys.active = true; startClock(); }
    function purchaseUpgrade(u, c) { if(sys.cores >= c) { sys.cores -= c; sys.upgrades[u] = true; updateUI(); window.cloudSave(); document.getElementById('store-balance').innerText = sys.cores; } }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
    
    const firebaseConfig = { 
        apiKey: "AIzaSyBgtFxsT_8S7QWk6nSpZwECjJQeKhNbIxE", 
        authDomain: "cyber-math-db-8b962.firebaseapp.com", 
        projectId: "cyber-math-db-8b962", 
        storageBucket: "cyber-math-db-8b962.firebasestorage.app", 
        messagingSenderId: "252299848545", 
        appId: "1:252299848545:web:7dc2809ee639a2125a3320" 
    };
    
    let db;
    window.cloudConnect = async function() { 
        if(db) return true; 
        try { 
            const app = initializeApp(firebaseConfig); 
            db = getFirestore(app); 
            return true; 
        } catch(e) { return false; } 
    };

    window.cloudSave = async function() { 
        if(!db || !currentHackerId || currentHackerId === "GUEST") return; 
        await setDoc(doc(db, "players", currentHackerId), { 
            cores: sys.cores, level: sys.level, combo: sys.combo, difficulty: sys.difficulty, upgrades: sys.upgrades 
        }); 
    };

    window.cloudLoad = async function(id) { 
        if(!db) return null; 
        const docSnap = await getDoc(doc(db, "players", id)); 
        return docSnap.exists() ? docSnap.data() : null; 
    };

    window.startNewSession = async function() {
        const connected = await window.cloudConnect();
        if(!connected) { document.getElementById('auth-msg').innerText = "DB ERROR"; return; }
        currentHackerId = Math.random().toString(36).substring(2, 8).toUpperCase();
        sys.difficulty = document.getElementById('difficulty-select').value;
        await window.cloudSave();
        localStorage.setItem('cm_hacker_id', currentHackerId);
        startGameUI();
    };

    window.loadHackerId = async function() {
        const input = document.getElementById('hacker-id-input').value.trim().toUpperCase();
        if(!input) return;
        const connected = await window.cloudConnect();
        if(!connected) return;
        const data = await window.cloudLoad(input);
        if(data) { 
            Object.assign(sys, data); 
            currentHackerId = input; 
            localStorage.setItem('cm_hacker_id', currentHackerId); 
            startGameUI(); 
        } else {
            document.getElementById('auth-msg').innerText = "ID NOT FOUND";
        }
    };
</script>

<script>
    if ('serviceWorker' in navigator) { 
        window.addEventListener('load', () => navigator.serviceWorker.register('sw.js')); 
    }
</script>
</body>
</html>
