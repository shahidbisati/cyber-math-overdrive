<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber-Math Overdrive</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cyber-Math">
    <link rel="apple-touch-icon" href="icon.svg">
    
    <script>
    (adsbygoogle = window.adsbygoogle || []).push({
     params: { tag_for_child_directed_treatment: 1 }
     });
    </script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9463288908257202" crossorigin="anonymous"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --neon-cyan: #00f3ff; --neon-pink: #ff007f; --neon-green: #39ff14;
            --dark-bg: #050510; --grid-color: rgba(0, 243, 255, 0.15);
            --block-bg: rgba(0, 0, 0, 0.8); --block-border: #00f3ff;
        }

        body {
            font-family: 'Share Tech Mono', monospace; background-color: var(--dark-bg);
            margin: 0; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: var(--neon-cyan); overflow: hidden; perspective: 1000px;
            touch-action: none; 
        }

        /* --- DENSE GALAXY BACKGROUND --- */
        .galaxy-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(45, 10, 89, 0.8) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(10, 50, 89, 0.8) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(89, 10, 50, 0.5) 0%, transparent 60%),
                var(--dark-bg);
            z-index: -2; overflow: hidden;
        }

        .stars, .stars-2, .stars-3 { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background-repeat: repeat; }
        .stars { background-image: radial-gradient(1.5px 1.5px at 20px 30px, #fff, transparent), radial-gradient(1.5px 1.5px at 150px 40px, rgba(255,255,255,0.6), transparent); background-size: 250px 250px; animation: stardrift 100s linear infinite; }
        .stars-2 { background-image: radial-gradient(1px 1px at 50px 160px, rgba(255,255,255,0.9), transparent); background-size: 350px 350px; animation: stardrift 150s linear infinite; opacity: 0.7; }
        .stars-3 { background-image: radial-gradient(2px 2px at 10px 10px, var(--neon-cyan), transparent), radial-gradient(2px 2px at 180px 180px, var(--neon-pink), transparent); background-size: 400px 400px; animation: stardrift 200s linear infinite; opacity: 0.5; }
        @keyframes stardrift { from { transform: translateY(0) translateX(0); } to { transform: translateY(-10%) translateX(-10%); } }

        .cyber-grid {
            position: absolute; bottom: -50%; left: -50%; width: 200%; height: 200%;
            background-image: linear-gradient(transparent 65%, var(--grid-color) 66%, transparent 68%), linear-gradient(90deg, transparent 65%, var(--grid-color) 66%, transparent 68%);
            background-size: 50px 50px; transform: rotateX(60deg); animation: gridMove 3s linear infinite; z-index: -1;
        }
        @keyframes gridMove { 0% { transform: rotateX(60deg) translateY(0); } 100% { transform: rotateX(60deg) translateY(50px); } }

        #hud-container {
            width: 95%; max-width: 550px; box-sizing: border-box;
            background: rgba(5, 5, 16, 0.85); border: 2px solid var(--neon-cyan);
            border-radius: 10px; padding: 15px 20px; box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
            position: relative; backdrop-filter: blur(5px); opacity: 0; transition: opacity 0.5s;
        }

        .header-system { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px; border-bottom: 1px solid rgba(0, 243, 255, 0.3); padding-bottom: 10px; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 16px; margin: 0; text-transform: uppercase; text-shadow: 0 0 10px var(--neon-cyan); }
        #timer { color: var(--neon-pink); font-size: 24px; font-weight: bold; text-shadow: 0 0 10px var(--neon-pink); }
        .currency-bar { display: flex; justify-content: space-between; background: rgba(0,0,0,0.5); padding: 8px 10px; border-radius: 5px; margin-bottom: 10px; border: 1px solid #444; }
        .target-display { text-align: center; margin: 10px 0; }
        #target-num { font-family: 'Orbitron', sans-serif; font-size: 60px; font-weight: 900; color: transparent; -webkit-text-stroke: 2px var(--neon-cyan); text-shadow: 0 0 30px rgba(0, 243, 255, 0.5); display: block; }
        .drop-zone { min-height: 140px; border: 1px solid rgba(0, 243, 255, 0.3); background: rgba(0, 243, 255, 0.02); margin: 5px 0 10px 0; padding: 10px; display: flex; flex-wrap: wrap; justify-content: center; align-content: flex-start; gap: 8px; transition: 0.2s; }
        
        .block {
            width: 55px; height: 55px; background: var(--block-bg); border: 2px solid var(--block-border); color: var(--block-border);
            font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: bold; display: flex; justify-content: center; align-items: center; 
            cursor: grab; text-shadow: 0 0 5px var(--block-border); border-radius: 8px; user-select: none; touch-action: none;
        }
        .block.dragging { opacity: 0.8; z-index: 9999; cursor: grabbing; transform: scale(1.1); pointer-events: none; }
        .spell-broken { opacity: 0.4; border-style: dashed; }

        .btn-row { display: flex; justify-content: space-between; margin-bottom: 5px; gap: 10px; }
        .action-btn { background: transparent; color: var(--neon-cyan); border: 2px solid var(--neon-cyan); padding: 8px 10px; font-family: 'Share Tech Mono'; font-size: 14px; cursor: pointer; text-transform: uppercase; width: 100%; }
        .logout-btn { background: transparent; border: 1px solid var(--neon-pink); color: var(--neon-pink); cursor: pointer; font-size: 10px; padding: 3px 6px; border-radius: 3px; }
        
        /* Start Screen Background Transparency Fix */
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: transparent; backdrop-filter: blur(3px); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .login-box { background: rgba(0,0,0,0.85); border: 1px solid var(--neon-cyan); padding: 20px; border-radius: 10px; box-shadow: 0 0 25px rgba(0,243,255,0.3); width: 80%; max-width: 350px; text-align: center;}
        .hacker-input { background: transparent; border: 1px solid var(--neon-cyan); color: var(--neon-cyan); font-family: 'Share Tech Mono'; font-size: 18px; padding: 10px; width: 100%; box-sizing: border-box; text-align: center; margin-bottom: 15px; text-transform: uppercase;}
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 16, 0.98); z-index: 60; display: none; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; overflow-y: auto; }
    </style>
</head>
<body>

<div class="galaxy-bg"><div class="stars"></div><div class="stars-2"></div><div class="stars-3"></div></div>
<div class="cyber-grid"></div>

<div id="start-screen">
    <h1 style="font-size: 30px; margin-bottom: 20px; text-shadow: 0 0 20px var(--neon-cyan); text-align:center; font-family:'Orbitron';">Cyber-Math<br>Overdrive</h1>
    <div class="login-box">
        <form onsubmit="event.preventDefault(); loadHackerId();" style="width: 100%;">
            <p style="font-size:12px; color:#888; margin-top:0;">ENTER HACKER ID</p>
            <input type="text" id="hacker-id-input" name="username" autocomplete="username" class="hacker-input" placeholder="e.g. X7K9P2" maxlength="6">
            <button type="submit" class="action-btn" style="margin-bottom: 10px;">RESUME SESSION</button>
        </form>
        <div style="margin: 10px 0; border-bottom: 1px solid #444;"></div>
        <p style="font-size:12px; color:#888;">SELECT PROTOCOL</p>
        <select id="difficulty-select" class="hacker-input" style="margin-bottom: 15px; background: rgba(0,0,0,0.8); cursor: pointer;">
            <option value="easy">EASY MODE</option>
            <option value="medium" selected>MEDIUM MODE</option>
            <option value="hard">HARD MODE</option>
        </select>
        <button class="action-btn" style="border-color:var(--neon-pink); color:var(--neon-pink); margin-bottom: 10px;" onclick="startNewSession()">NEW HACKER</button>
        <button class="action-btn" style="border-color:#888; color:#888;" onclick="startGuestSession()">GUEST ACCESS</button>
        <p id="auth-msg" style="color:var(--neon-pink); font-size:12px; height:15px; margin-top: 10px;"></p>
    </div>
</div>

<div id="id-modal" class="overlay" style="justify-content:center;">
    <h2 style="color: var(--neon-green); font-family: 'Orbitron'; text-align:center;">ID GENERATED</h2>
    <p style="margin-bottom: 20px; text-align:center;">Copy your ID to resume later!</p>
    <div style="font-family: 'Orbitron'; font-size: 45px; color: var(--neon-cyan); letter-spacing: 5px; margin-bottom: 20px;" id="id-modal-text">---</div>
    <button class="action-btn" id="copy-id-btn" onclick="copyHackerId()" style="margin-bottom: 15px;">[ COPY TO CLIPBOARD ]</button>
    <button class="action-btn" style="border-color:var(--neon-green); color:var(--neon-green);" onclick="closeIdModal()">[ START GAME ]</button>
</div>

<div id="hud-container">
    <div class="header-system">
        <div>
            <h1>Node <span id="level-txt">1</span></h1>
            <div style="display: flex; align-items: center; gap: 10px; margin-top: 5px; font-size:12px;">
                <span>ID: <span id="display-hacker-id" style="color:var(--neon-cyan); font-weight:bold;">---</span></span>
                <button class="logout-btn" onclick="logoutSession()">[ LOGOUT ]</button>
            </div>
            <div id="display-diff" style="color: var(--neon-pink); font-size:10px; font-weight:bold; margin-top:5px;">MEDIUM MODE</div>
        </div>
        <div style="text-align: right;">
            <div style="font-size:12px;">Score: <span id="score-txt">0</span></div>
            <div id="timer">30.0</div>
        </div>
    </div>
    <div class="currency-bar">
        <div style="color: #f1c40f; font-size:14px;">Cores: <span id="core-txt">0</span></div>
        <div style="color: var(--neon-pink); font-size:14px;">Combo: x<span id="combo-txt">1</span></div>
    </div>
    <div class="btn-row">
        <button class="action-btn" id="emp-btn" onclick="triggerEMP()">[ EMP ]</button>
        <button class="action-btn" onclick="openStore()" style="border-color: #f1c40f; color: #f1c40f;">[ STORE ]</button>
    </div>
    <div class="target-display"><span id="target-num">0</span></div>
    <div id="drop-zone" class="drop-zone"></div>
    <div id="pool-zone" class="drop-zone"></div>
    <div id="system-msg" style="text-align:center; height:20px; font-weight:bold;"></div>
</div>

<script>
    let currentHackerId = "";
    let sys = { 
        level: 1, score: 0, topScore: 0, target: 0, time: 30, timerInterval: null, 
        active: false, empAvailable: true, startTime: 0, combo: 1, cores: 0, difficulty: 'medium', 
        upgrades: { timeDilator: false, spellbreaker: false, decoyDeflector: false }
    };

    window.cloudConnect = async function() { return false; };
    window.cloudSave = async function() {};
    window.cloudLoad = async function(id) { return null; };

    let audioCtx;
    function playSound(type) {
        if (!audioCtx || audioCtx.state === 'suspended') return;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'drag') { osc.frequency.setValueAtTime(800, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+0.1); osc.start(); osc.stop(audioCtx.currentTime+0.1); }
        else if (type === 'drop') { osc.frequency.setValueAtTime(150, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+0.1); osc.start(); osc.stop(audioCtx.currentTime+0.1); }
    }

    window.addEventListener('load', async () => {
        const savedId = localStorage.getItem('cm_hacker_id');
        if (savedId && savedId !== 'GUEST') {
            document.getElementById('hacker-id-input').value = savedId;
            const connected = await window.cloudConnect();
            if (connected) {
                const data = await window.cloudLoad(savedId);
                if (data) Object.assign(sys, data);
            }
        }
    });

    window.startNewSession = async function() {
        if(!await window.cloudConnect()) return;
        currentHackerId = Math.random().toString(36).substring(2, 8).toUpperCase();
        sys.difficulty = document.getElementById('difficulty-select').value;
        await window.cloudSave();
        localStorage.setItem('cm_hacker_id', currentHackerId);
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('id-modal-text').innerText = currentHackerId;
        document.getElementById('id-modal').style.display = 'flex';
    };

    window.closeIdModal = function() { document.getElementById('id-modal').style.display = 'none'; startGameUI(); };
    window.copyHackerId = function() { navigator.clipboard.writeText(currentHackerId); document.getElementById('copy-id-btn').innerText = "COPIED!"; };

    window.loadHackerId = async function() {
        const input = document.getElementById('hacker-id-input').value.trim().toUpperCase();
        if(!await window.cloudConnect()) return;
        const data = await window.cloudLoad(input);
        if(data) { Object.assign(sys, data); currentHackerId = input; localStorage.setItem('cm_hacker_id', currentHackerId); startGameUI(); }
    };

    window.startGuestSession = function() {
        currentHackerId = "GUEST"; sys.difficulty = document.getElementById('difficulty-select').value;
        localStorage.setItem('cm_hacker_id', 'GUEST'); startGameUI();
    };

    window.logoutSession = function() { localStorage.removeItem('cm_hacker_id'); location.reload(); };

    function startGameUI() {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('hud-container').style.opacity = '1';
        document.getElementById('display-hacker-id').innerText = currentHackerId;
        document.getElementById('display-diff').innerText = sys.difficulty.toUpperCase() + " MODE";
        updateUI(); initProtocol();
    }

    function updateUI() {
        document.getElementById('level-txt').innerText = sys.level;
        document.getElementById('score-txt').innerText = sys.score;
        document.getElementById('core-txt').innerText = sys.cores;
        document.getElementById('combo-txt').innerText = sys.combo;
    }

    let draggedBlock = null; let offsetX = 0, offsetY = 0;
    function handlePointerDown(e) {
        const target = e.target.closest('.block'); if (!target || !sys.active) return;
        draggedBlock = target;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const rect = draggedBlock.getBoundingClientRect();
        offsetX = clientX - rect.left; offsetY = clientY - rect.top;
        const placeholder = document.createElement('div'); placeholder.className = 'block'; placeholder.id = 'drag-placeholder'; placeholder.style.visibility = 'hidden';
        draggedBlock.parentElement.insertBefore(placeholder, draggedBlock);
        document.body.appendChild(draggedBlock);
        Object.assign(draggedBlock.style, { position:'fixed', margin:'0', left:rect.left+'px', top:rect.top+'px', zIndex:'9999' });
        playSound('drag');
    }

    function handlePointerMove(e) {
        if (!draggedBlock) return;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        draggedBlock.style.left = (clientX - offsetX) + 'px'; draggedBlock.style.top = (clientY - offsetY) + 'px';
    }

    function handlePointerUp(e) {
        if (!draggedBlock) return;
        const clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
        const clientY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
        draggedBlock.classList.remove('dragging');
        Object.assign(draggedBlock.style, { position:'', left:'', top:'', zIndex:'' });
        document.getElementById('drag-placeholder')?.remove();
        const dz = document.getElementById('drop-zone'); const dzRect = dz.getBoundingClientRect();
        const isOver = (clientX >= dzRect.left && clientX <= dzRect.right && clientY >= dzRect.top && clientY <= dzRect.bottom);
        playSound('drop');
        if (isOver) dz.appendChild(draggedBlock); else document.getElementById('pool-zone').appendChild(draggedBlock);
        validateInput(); draggedBlock = null;
    }

    document.addEventListener('mousedown', handlePointerDown); document.addEventListener('mousemove', handlePointerMove); document.addEventListener('mouseup', handlePointerUp);
    document.addEventListener('touchstart', handlePointerDown, {passive:false}); document.addEventListener('touchmove', handlePointerMove, {passive:false}); document.addEventListener('touchend', handlePointerUp);

    function initProtocol() {
        sys.active = true; document.getElementById('system-msg').innerText = "";
        document.getElementById('drop-zone').innerHTML = ''; document.getElementById('pool-zone').innerHTML = '';
        let count, max, decoys;
        if (sys.difficulty === 'easy') { count = Math.min(2 + Math.floor((sys.level-1)/4), 3); max = Math.min(3 + Math.floor((sys.level-1)/2), 9); decoys = sys.level > 5 ? 1 : 0; }
        else if (sys.difficulty === 'hard') { count = Math.min(3 + Math.floor((sys.level-1)/3), 5); max = Math.min(8 + Math.floor((sys.level-1)*1.5), 25); decoys = sys.level > 10 ? Math.min(2+Math.floor((sys.level-10)/3), 5) : 2; }
        else { count = Math.min(2 + Math.floor((sys.level-1)/3), 4); max = Math.min(5 + (sys.level-1), 15); decoys = sys.level > 10 ? Math.min(1+Math.floor((sys.level-10)/4), 4) : 1; }
        let sum = 0; let blocks = [];
        for(let i=0; i<count; i++) { let v = Math.floor(Math.random()*max)+1; sum += v; blocks.push({v:v, d:false}); }
        sys.target = sum; document.getElementById('target-num').innerText = sum;
        for(let i=0; i<Math.max(0, decoys-(sys.upgrades.decoyDeflector?1:0)); i++) { blocks.push({v:Math.floor(Math.random()*max)+1, d:true}); }
        blocks.sort(()=>Math.random()-0.5).forEach(b => {
            const el = document.createElement('div'); el.className = 'block'; el.innerText = b.v; el.dataset.val = b.v;
            document.getElementById('pool-zone').appendChild(el);
        });
        startClock();
    }

    function startClock() {
        clearInterval(sys.timerInterval);
        let time = (sys.difficulty === 'easy' ? 30 : (sys.difficulty === 'hard' ? 15 : 25)) + (sys.upgrades.timeDilator ? 5 : 0);
        sys.time = time;
        sys.timerInterval = setInterval(() => { sys.time -= 0.1; document.getElementById('timer').innerText = sys.time.toFixed(1); if(sys.time <= 0) resetCombo(); }, 100);
    }

    function validateInput() {
        let cur = 0; Array.from(document.getElementById('drop-zone').children).forEach(b => cur += parseInt(b.dataset.val));
        if(cur === sys.target) { sys.active = false; clearInterval(sys.timerInterval); playSound('win'); 
            let mult = sys.difficulty==='easy'?0.5:(sys.difficulty==='hard'?1.5:1);
            sys.score += Math.floor(100*sys.combo*mult); sys.cores += (sys.difficulty==='easy'?5:10) + Math.floor(sys.level*sys.combo);
            sys.combo++; sys.level++; window.cloudSave(); updateUI(); confetti(); setTimeout(initProtocol, 1500);
        } else if (cur > sys.target) resetCombo();
    }

    function resetCombo() { sys.combo = 1; sys.level = 1; sys.score = 0; updateUI(); initProtocol(); }
    function openStore() { sys.active = false; clearInterval(sys.timerInterval); document.getElementById('store-core-balance').innerText = sys.cores; document.getElementById('store-overlay').style.display = 'flex'; }
    function closeStore() { document.getElementById('store-overlay').style.display = 'none'; sys.active = true; startClock(); }
    function purchaseTheme(t, c) { if(sys.cores >= c) { sys.cores -= c; document.documentElement.style.setProperty('--block-border', `var(--${t})`); window.cloudSave(); updateUI(); } }
    function purchaseUpgrade(u, c) { if(sys.cores >= c) { sys.cores -= c; sys.upgrades[u] = true; window.cloudSave(); updateUI(); } }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
    const firebaseConfig = { apiKey: "AIzaSyBgtFxsT_8S7QWk6nSpZwECjJQeKhNbIxE", authDomain: "cyber-math-db-8b962.firebaseapp.com", projectId: "cyber-math-db-8b962", storageBucket: "cyber-math-db-8b962.firebasestorage.app", messagingSenderId: "252299848545", appId: "1:252299848545:web:7dc2809ee639a2125a3320", measurementId: "G-RL4B0DCB6F" };
    let db;
    window.cloudConnect = async function() { if(db) return true; try { db = getFirestore(initializeApp(firebaseConfig)); return true; } catch(e) { return false; } };
    window.cloudSave = async function() { if(!db || !currentHackerId || currentHackerId === "GUEST") return; await setDoc(doc(db, "players", currentHackerId), { cores: sys.cores, level: sys.level, combo: sys.combo, difficulty: sys.difficulty, upgrades: sys.upgrades }); };
    window.cloudLoad = async function(id) { if(!db) return null; const docSnap = await getDoc(doc(db, "players", id)); return docSnap.exists() ? docSnap.data() : null; };
</script>

<script>if ('serviceWorker' in navigator) { window.addEventListener('load', () => navigator.serviceWorker.register('sw.js')); }</script>
</body>
</html>
